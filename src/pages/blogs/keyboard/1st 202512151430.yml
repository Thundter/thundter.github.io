meta:
  engine: 4.1.0
units:
  # Proxy Spacing Variables
  kx: cx
  ky: cy
  # Padding Variables
  px: kx + 2
  py: ky + 2  
points:
  key:
    padding: py
    spread: px
  zones:
    matrix:
      anchor.shift: [45,-110] # Fix KiCad placement
      columns:
        outer1:
          key:
            column_net: P2
        outer2:
          key:
            column_net: P2
        pinky:
          key:
            column_net: P3
        ring:
          key:
            # stagger: 4
            column_net: P4
        middle:
          key:
            # stagger: 4
            column_net: P5
        index:
          key:
            column_net: P6
        inner:
          key:
            column_net: P7
      rows:
        bottom:
          row_net: P21
        home:
          row_net: P20
        top:
          row_net: P19
        number:
          row_net: P18
        function:
          row_net: P15
    modifier:
      anchor:
        aggregate.parts:
          - ref: matrix_outer_bottom
        shift: [0, -py]
      rows:
        key:
          row_net: ???
      columns:
        outer:
          key:
            column_net: P3
        pinky:
          key:
            column_net: P5
        ring:
          key:
            # stagger: 4
            column_net: P6
    thumb:
      anchor:
        aggregate.parts:
          - ref: matrix_index_bottom
        shift: [0, -py]
      columns:
        left:
          key:
            shift: [0,-py*.25]
        middle:
          key:
            rotate: -9
            shift: [3,-1.5-py*.25]
        right:
          key:
            rotate: -20
            shift: [5.5,-6.5-py*.25]
        inner:
          key:
            rotate: -29
            shift: [6.5,-15-py*.25]
pcbs:
  pcb:
    template: kicad8
    outlines:
      main:
        outline: PCBLayer
        layer: Edge.Cuts
    footprints:
      keyswitches:
        what: ceoloide/switch_choc_v1_v2
        where: true
        params:
          to: "{{column_net}}"
          from: "{{colrow}}"
          include_keycap: true
          hotswap: true
      diodes:
        what: ceoloide/diode_tht_sod123
        where: true
        adjust:
          shift: [0, -4.7]
          rotate: 180
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
      controller:
        what: ceoloide/mcu_nice_nano
        where:
          aggregate.parts:
            - ref: matrix_inner_function
          shift: [20, -5]
outlines:
  BaseLayer:
    - what: polygon
      fillet: 5
      points:
        - ref: matrix_outer_function
          shift: [-kx, ky]
        - ref: matrix_outer_bottom
          shift: [-kx, -2.25ky] 
        - ref: matrix_index_bottom
          shift: [-kx, -2.25ky] 
        - ref: thumb_
          shift: [0, -ky]
        - ref: thumb_
          shift: [0, -ky]
        - ref: thumb_middle
          shift: [0, -ky]
        - ref: thumb_right
          shift: [0, -ky]
        - ref: thumb_inner
          shift: [0, -ky]
        - ref: thumb_inner
          shift: [kx, -ky]
        - ref: thumb_inner
          shift: [kx, ky]
        - ref: thumb_inner
          shift: [0, ky]
        - ref: thumb_right
          shift: [0, ky]
        - ref: matrix_inner_bottom
          shift: [kx, -0.5ky]
        - ref: matrix_inner_top
          shift: [kx, 0.3ky]
        - ref: matrix_inner_top
          shift: [2kx, 0.3ky]
        - ref: matrix_inner_function
          shift: [2kx, ky]
  KeyLayer:
    - what: polygon
      fillet: 5
      points:
        - ref: matrix_outer_function
          shift: [-kx, ky]
        - ref: matrix_outer_bottom
          shift: [-kx, -2.25ky] 
        - ref: matrix_index_bottom
          shift: [-kx, -2.25ky] 
        - ref: thumb_
          shift: [0, -ky]
        - ref: thumb_
          shift: [0, -ky]
        - ref: thumb_middle
          shift: [0, -ky]
        - ref: thumb_right
          shift: [0, -ky]
        - ref: thumb_inner
          shift: [0, -ky]
        - ref: thumb_inner
          shift: [kx, -ky]
        - ref: thumb_inner
          shift: [kx, ky]
        - ref: thumb_inner
          shift: [0, ky]
        - ref: thumb_right
          shift: [0, ky]
        - ref: matrix_inner_bottom
          shift: [kx, -0.5ky]
        - ref: matrix_inner_top
          shift: [kx, 0.3ky]
        - ref: matrix_inner_top
          shift: [2kx, 0.3ky]
        - ref: matrix_inner_function
          shift: [2kx, ky]
    #  key holes
    - what: rectangle
      where: 
        - /matrix.*/
        - /modifier.*/
        - /thumb.*/
      size: [14, 14]
      operation: subtract
  PCBLayer:
    - what: polygon
      points:
        - ref: matrix_outer_function
          shift: [-0.6kx, 0.6ky]
        - ref: matrix_outer_bottom
          shift: [-0.6kx, -1.6ky]
        - ref: matrix_index_bottom
          shift: [-0.6kx, -1.6ky]
        - ref: thumb_
          shift: [-0.6kx, -0.6ky]
        - ref: thumb_
          shift: [0, -0.6ky]
        - ref: thumb_
          shift: [0.5kx, -0.6ky]
        - ref: thumb_middle
          shift: [-0.5kx, -0.6ky]
        - ref: thumb_middle
          shift: [0.5kx, -0.6ky]
        - ref: thumb_right
          shift: [-0.5kx, -0.6ky]
        - ref: thumb_right
          shift: [0.5kx, -0.6ky]
        - ref: thumb_inner
          shift: [-0.5kx, -0.6ky]
        - ref: thumb_inner
          shift: [0.6kx, -0.6ky]
        - ref: thumb_inner
          shift: [0.6kx, 0.6ky]
        - ref: thumb_inner
          shift: [-0.5kx, 0.6ky]
        - ref: thumb_right
          shift: [0.5kx, 0.6ky]
        - ref: thumb_right
          shift: [-0.5kx, 0.6ky]
        - ref: thumb_middle
          shift: [0.5kx, 0.6ky]
        - ref: thumb_middle
          shift: [0.35kx, 0.6ky]
        - ref: matrix_inner_number
          shift: [0.6kx, -0.4ky]
        - ref: matrix_inner_number
          shift: [1.7kx, -0.4ky]
        - ref: matrix_inner_function
          shift: [1.7kx, 0.6ky]
